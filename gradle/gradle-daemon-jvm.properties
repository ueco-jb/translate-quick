# Pin the Gradle daemon to JDK 21. AGP 8.x officially supports 17/21 only;
# without this, an ambient JAVA_HOME pointing at JDK 26+ breaks the
# JdkImageTransform that prepares android.jar for compilation.
#
# Gradle auto-discovers JDKs in /usr/lib/jvm/, $JAVA_HOME, $PATH, SDKMAN, asdf,
# IDE-bundled, etc. On Arch with `jdk21-openjdk` installed, this resolves to
# /usr/lib/jvm/java-21-openjdk with no further setup.
toolchainVersion=21
